<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Resume Analyzer</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-3xl bg-white rounded-3xl shadow-2xl p-8">

        <!-- Heading -->
        <div class="text-center mb-8">

            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                AI Resume Analyzer
            </h1>

            <p class="text-gray-500">
                Upload your resume and discover matching internships
            </p>

        </div>

        <!-- Upload Box -->
        <div
            class="border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center hover:border-blue-400 transition">

            <input type="file" id="resumeInput" class="hidden" />

            <label for="resumeInput" class="cursor-pointer">

                <div class="flex flex-col items-center">

                    <div class="bg-blue-100 p-4 rounded-full mb-4">
                        <span class="text-3xl">📄</span>
                    </div>

                    <h2 class="text-xl font-semibold text-gray-700 mb-2">
                        Upload Resume
                    </h2>

                    <p class="text-gray-400 text-sm">
                        PDF format only
                    </p>

                </div>

            </label>

        </div>

        <!-- Button -->
        <button type="button" onclick="uploadResume()"
            class="w-full mt-6 bg-blue-600 hover:bg-blue-700 transition text-white font-semibold py-3 rounded-xl shadow-md">
            Analyze Resume
        </button>

        <!-- Loading -->
        <div id="loading" class="hidden text-center mt-6 text-blue-600 font-medium">
            Analyzing Resume...
        </div>

        <!-- Result Section -->
        <div id="result" class="mt-10 hidden">

            <!-- Skills -->
            <div class="mb-8">

                <h2 class="text-2xl font-bold text-gray-800 mb-4">
                    Extracted Skills
                </h2>

                <div id="skillsContainer" class="flex flex-wrap gap-3"></div>

            </div>

            <!-- Internship Matches -->
            <div>

                <h2 class="text-2xl font-bold text-gray-800 mb-4">
                    Matching Internships
                </h2>

                <div id="jobsContainer" class="space-y-4"></div>

            </div>

        </div>

    </div>

    <script src="js/script.js?v=2"></script>

</body>

</html>

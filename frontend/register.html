<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Page</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-cyan-500 via-blue-600 to-indigo-700 px-4">

    <!-- Register Card -->
    <div class="w-full max-w-lg bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl shadow-2xl p-8">

        <!-- Heading -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white">
                Create Account
            </h1>

            <p class="text-gray-200 mt-2">
                Register to get started
            </p>
        </div>

        <!-- Form -->
        <form id="registerForm" class="space-y-5">

            <!-- Full Name -->
            <div>
                <label class="block text-white mb-2 font-medium">
                    Full Name
                </label>

                <input type="text" id="name" placeholder="Enter your full name"
                    class="w-full px-4 py-3 rounded-xl bg-white/20 text-white placeholder-gray-200 border border-white/30 outline-none focus:ring-2 focus:ring-white" />
            </div>

            <!-- Email -->
            <div>
                <label class="block text-white mb-2 font-medium">
                    Email
                </label>

                <input type="email" id="email" placeholder="Enter your email"
                    class="w-full px-4 py-3 rounded-xl bg-white/20 text-white placeholder-gray-200 border border-white/30 outline-none focus:ring-2 focus:ring-white" />
            </div>

            <!-- Password -->
            <div>
                <label class="block text-white mb-2 font-medium">
                    Password
                </label>

                <div class="relative">
                    <input type="password" id="password" placeholder="Create password"
                        class="w-full px-4 py-3 rounded-xl bg-white/20 text-white placeholder-gray-200 border border-white/30 outline-none focus:ring-2 focus:ring-white" />

                    <button type="button" id="togglePassword" class="absolute right-4 top-3 text-white">
                        Show
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-white mb-2 font-medium">
                    Confirm Password
                </label>

                <div class="relative">
                    <input type="password" id="confirmPassword" placeholder="Confirm password"
                        class="w-full px-4 py-3 rounded-xl bg-white/20 text-white placeholder-gray-200 border border-white/30 outline-none focus:ring-2 focus:ring-white" />

                    <button type="button" id="toggleConfirmPassword" class="absolute right-4 top-3 text-white">
                        Show
                    </button>
                </div>
            </div>

            <!-- Terms -->
            <div class="flex items-start gap-2 text-white text-sm">
                <input type="checkbox" id="terms" class="mt-1 accent-cyan-400" />

                <label for="terms">
                    I agree to the
                    <a href="#" class="font-semibold underline">
                        Terms & Conditions
                    </a>
                </label>
            </div>

            <!-- Register Button -->
            <button type="submit"
                class="w-full bg-white text-indigo-700 font-bold py-3 rounded-xl hover:scale-105 transition duration-300 shadow-lg">
                Register
            </button>

        </form>

        <!-- Divider -->
        <div class="flex items-center gap-4 my-6">
            <div class="flex-1 h-[1px] bg-white/30"></div>
            <span class="text-white text-sm">OR</span>
            <div class="flex-1 h-[1px] bg-white/30"></div>
        </div>

        <!-- Social Login -->
        <div class="space-y-3">

            <button class="w-full bg-white text-black py-3 rounded-xl font-semibold hover:bg-gray-100 transition">
                Continue with Google
            </button>

            <button class="w-full bg-blue-700 text-white py-3 rounded-xl font-semibold hover:bg-blue-800 transition">
                Continue with Facebook
            </button>

        </div>

        <!-- Login Link -->
        <p class="text-center text-white mt-8">
            Already have an account?
            <a href="#" class="font-bold hover:underline">
                Login
            </a>
        </p>

    </div>

    <script src="./js/register.js"></script>
</body>

</html>
